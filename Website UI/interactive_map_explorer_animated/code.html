<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RiverFlow | Interactive Map Explorer</title>

                        "outline": "#88919d",

<style>
        .glass-panel {
            background: rgba(11, 19, 38, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .shadow-navy {
            box-shadow: 0 0 20px rgba(0, 8, 20, 0.4);
        }
        .river-glow {
            filter: drop-shadow(0 0 12px rgba(0, 163, 255, 1));
            animation: pulse-river 4s ease-in-out infinite;
        }
        @keyframes pulse-river {
            0%, 100% { opacity: 0.7; stroke-width: 4; filter: drop-shadow(0 0 8px rgba(0, 163, 255, 0.6)); }
            50% { opacity: 1; stroke-width: 6; filter: drop-shadow(0 0 16px rgba(0, 163, 255, 1)); }
        }
        .btn-3d {
            background: linear-gradient(to bottom, #00a3ff, #00629d);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3), 0 2px 4px rgba(0, 0, 0, 0.4);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-3d:active {
            transform: scale(0.98);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(152, 203, 255, 0.2);
            border-radius: 10px;
        }
        .map-entrance {
            animation: map-zoom-in 3.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes map-zoom-in {
            from { transform: scale(1.15) translateZ(0); opacity: 0.8; }
            to { transform: scale(1) translateZ(0); opacity: 1; }
        }
        .tilt-card {
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            perspective: 1000px;
        }
        .tilt-card:hover {
            transform: perspective(1000px) rotateX(2deg) rotateY(-2deg) translateY(-5px);
        }
        .sidebar-glass {
            background: rgba(23, 31, 51, 0.4);
            backdrop-filter: blur(20px);
            transition: background 0.5s ease, backdrop-filter 0.5s ease;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md overflow-hidden">
<!-- TopNavBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-gutter py-sm bg-surface/80 backdrop-blur-md dark:bg-surface-dim/80 border-b border-white/10 dark:border-outline-variant shadow-sm dark:shadow-none">
<div class="flex items-center gap-lg">
<span class="font-headline-md text-headline-md font-bold tracking-tight text-primary dark:text-primary-fixed-dim">RIVERFLOW</span>
<nav class="hidden md:flex gap-md">
<a class="font-body-md text-body-md text-primary dark:text-primary-fixed-dim border-b-2 border-primary pb-1" href="#">Explorer</a>
<a class="font-body-md text-body-md text-on-surface-variant dark:text-on-surface-variant hover:text-primary transition-colors" href="#">Blog</a>
<a class="font-body-md text-body-md text-on-surface-variant dark:text-on-surface-variant hover:text-primary transition-colors" href="#">Forum</a>
</nav>
</div>
<div class="flex items-center gap-md">
<div class="relative group">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">search</span>
<input class="bg-surface-container-high/40 border border-outline-variant rounded-full pl-xl pr-md py-xs w-64 focus:w-80 focus:ring-2 focus:ring-primary focus:bg-surface-container-high transition-all outline-none text-body-md" placeholder="Search rivers, basins, data..." type="text"/>
</div>
<button class="p-xs rounded-full hover:bg-surface-container-highest/20 dark:hover:bg-surface-container-highest/30 transition-all active:scale-95">
<span class="material-symbols-outlined text-[28px] text-primary" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<!-- Main Explorer Canvas -->
<main class="relative w-full h-screen pt-16">
<!-- 3D Map Placeholder Base -->
<div class="absolute inset-0 z-0 overflow-hidden">
<img class="w-full h-full object-cover map-entrance" data-alt="A cinematic, high-angle satellite view of a vast river system snaking through an arid landscape at twilight. The water body is enhanced with a glowing, digital cyan-blue overlay representing data-driven flow metrics. The surrounding terrain is rendered in deep indigo and charcoal tones with sharp mountain ridges and textured riverbeds. The overall aesthetic is scientific, immersive, and high-contrast with a clear sense of 3D depth and crystalline clarity." data-location="Nile River Delta" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBv3Bf3tJxz2u3FzGb7yBCEocqx7ZgdMVThIwiRYOBFLvw844ct9NkPsuxz8ZVJ8Yu_GdQLSGA9b3FoKlorSa9MRsWciNwQpiB6c-GTMMS2jkOyoixvmosb0enOh8HM8qyfhpeclV9n3bwokItptz8MbC2tyJYJxR1cuICtzhapydt2hDnuwcYQS6FQhCa0o740TwdpYfnUjwcamUAqlg-EfU-0aRALa4pzF--zGwogdrkStoYHWOGtggmy195ElVckjIs5i4u1c-EZ"/>
<!-- SVG Overlay for "Glowing River Path" -->
<svg class="absolute inset-0 w-full h-full pointer-events-none map-entrance" preserveaspectratio="none">
<path class="river-glow" d="M 400,200 Q 600,400 800,300 T 1200,600 T 1600,450" fill="none" stroke="#00a3ff" stroke-width="4" style="stroke-dasharray: 2000; stroke-dashoffset: 2000;">
<animate attributename="stroke-dashoffset" dur="10s" from="2000" repeatcount="indefinite" to="0"></animate>
</path>
</svg>
</div>
<!-- SideNavBar -->
<aside class="fixed left-0 top-16 h-[calc(100vh-64px)] z-40 flex flex-col p-md sidebar-glass border-r border-white/10 shadow-navy duration-300 w-[320px]">
<div class="mb-lg">
<h2 class="font-headline-lg text-headline-lg text-primary">River Metrics</h2>
<p class="font-label-sm text-label-sm font-data-mono text-on-surface-variant">Real-time Data</p>
</div>
<div class="flex-1 flex flex-col gap-xs overflow-y-auto custom-scrollbar">
<!-- Nav Item 1 -->
<button class="flex items-center gap-sm p-sm bg-secondary-container dark:bg-secondary text-on-secondary-container dark:text-on-secondary rounded-lg transition-all">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
<span class="font-label-sm text-label-sm font-data-mono">Map Layers</span>
</button>
<!-- Nav Item 2 -->
<button class="flex items-center gap-sm p-sm text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-bright/20 rounded-lg transition-all">
<span class="material-symbols-outlined" data-icon="3d_rotation">3d_rotation</span>
<span class="font-label-sm text-label-sm font-data-mono">3D View</span>
</button>
<!-- Nav Item 3 -->
<button class="flex items-center gap-sm p-sm text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-bright/20 rounded-lg transition-all">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-label-sm text-label-sm font-data-mono">River Stats</span>
</button>
<!-- Nav Item 4 -->
<button class="flex items-center gap-sm p-sm text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-bright/20 rounded-lg transition-all">
<span class="material-symbols-outlined" data-icon="list_alt">list_alt</span>
<span class="font-label-sm text-label-sm font-data-mono">Legend</span>
</button>
</div>
<button class="mt-md w-full py-sm rounded-lg btn-3d text-on-primary font-label-sm text-label-sm flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[18px]">file_download</span>
            Export Report
        </button>
</aside>
<!-- Dynamic Data Card (Bottom Right) -->
<div class="fixed bottom-md right-md z-40 glass-panel p-md rounded-lg w-[360px] shadow-navy border border-white/10 tilt-card">
<div class="flex justify-between items-start mb-sm">
<div>
<span class="font-label-sm text-label-sm text-secondary uppercase tracking-widest">Active Focus</span>
<h3 class="font-headline-md text-headline-md text-on-surface font-bold">Current River: Nile</h3>
</div>
<button class="text-on-surface-variant hover:text-white transition-colors">
<span class="material-symbols-outlined">info</span>
</button>
</div>
<div class="grid grid-cols-2 gap-sm mb-md">
<div class="bg-surface-container-low p-sm rounded-lg border border-white/5">
<p class="font-label-sm text-label-sm text-on-surface-variant">Length</p>
<p class="font-data-mono text-data-mono text-primary text-body-lg">6,650 km</p>
</div>
<div class="bg-surface-container-low p-sm rounded-lg border border-white/5">
<p class="font-label-sm text-label-sm text-on-surface-variant">Flow Rate</p>
<p class="font-data-mono text-data-mono text-secondary text-body-lg">2,830 m³/s</p>
</div>
</div>
<div class="space-y-xs">
<div class="flex justify-between text-label-sm font-data-mono">
<span class="text-on-surface-variant">Origin:</span>
<span class="text-on-surface">Lake Victoria</span>
</div>
<div class="flex justify-between text-label-sm font-data-mono">
<span class="text-on-surface-variant">Mouth:</span>
<span class="text-on-surface">Mediterranean Sea</span>
</div>
</div>
<!-- Sparkline Trend Chart -->
<div class="mt-md h-12 w-full relative overflow-hidden rounded bg-surface-container-lowest/30">
<svg class="absolute bottom-0 left-0 w-full h-full" preserveaspectratio="none">
<path d="M0,40 L30,35 L60,38 L90,25 L120,30 L150,15 L180,20 L210,10 L240,15 L270,5 L300,12 L330,8 L360,10 V48 H0 Z" fill="rgba(74, 225, 131, 0.1)" stroke="#4ae183" stroke-width="1.5">
</path>
</svg>
</div>
<p class="text-[10px] font-data-mono text-center mt-xs text-outline tracking-tight">ANNUAL FLOW VARIANCE (PREDICTIVE MODEL)</p>
</div>
<!-- Map Controls (Floating Center-Right) -->
<div class="fixed right-md top-1/2 -translate-y-1/2 z-40 flex flex-col gap-xs">
<button class="glass-panel p-sm rounded-lg hover:bg-surface-container-highest/40 transition-all text-on-surface">
<span class="material-symbols-outlined">add</span>
</button>
<button class="glass-panel p-sm rounded-lg hover:bg-surface-container-highest/40 transition-all text-on-surface border-t-0">
<span class="material-symbols-outlined">remove</span>
</button>
<div class="h-4"></div>
<button class="glass-panel p-sm rounded-lg hover:bg-surface-container-highest/40 transition-all text-on-surface">
<span class="material-symbols-outlined">my_location</span>
</button>
<button class="glass-panel p-sm rounded-lg hover:bg-surface-container-highest/40 transition-all text-on-surface">
<span class="material-symbols-outlined">explore</span>
</button>
</div>
</main>
<footer class="hidden">
<p>© 2024 RiverFlow Exploration. All Rights Reserved.</p>
</footer>
<script>
    // Logic for active navigation in SideNavBar
    const navButtons = document.querySelectorAll('aside button');
    navButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            // Only toggle for the first 4 nav buttons (menu items)
            if(btn.classList.contains('btn-3d')) return;
            
            navButtons.forEach(b => {
                if(b.classList.contains('btn-3d')) return;
                b.classList.remove('bg-secondary-container', 'dark:bg-secondary', 'text-on-secondary-container', 'dark:text-on-secondary');
                b.classList.add('text-on-surface-variant', 'dark:text-on-surface-variant', 'hover:bg-surface-bright/20');
            });
            btn.classList.add('bg-secondary-container', 'dark:bg-secondary', 'text-on-secondary-container', 'dark:text-on-secondary');
            btn.classList.remove('text-on-surface-variant', 'dark:text-on-surface-variant', 'hover:bg-surface-bright/20');
        });
    });

    // Subtle parallax mouse movement for the map (pseudo-3D effect)
    document.addEventListener('mousemove', (e) => {
        const mapImg = document.querySelector('.map-entrance');
        const riverSvg = document.querySelector('svg.map-entrance');
        if(mapImg) {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 100;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 100;
            mapImg.style.transform = `scale(1.05) translate(${xAxis}px, ${yAxis}px)`;
            riverSvg.style.transform = `translate(${xAxis}px, ${yAxis}px)`;
        }
    });
</script>
</body></html>
