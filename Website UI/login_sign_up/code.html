<script>
        // Atmospheric Micro-interactions
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('particle-container');
            const particleCount = 15;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'absolute bg-primary/20 rounded-full blur-[1px] pointer-events-none';
                
                const size = Math.random() * 4 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                resetParticle(particle);
                container.appendChild(particle);
            }

            function resetParticle(p) {
                const startX = Math.random() * 100;
                const startY = Math.random() * 100;
                p.style.left = `${startX}%`;
                p.style.top = `${startY}%`;
                p.style.opacity = Math.random() * 0.5 + 0.1;
                
                animateParticle(p);
            }

            function animateParticle(p) {
                const duration = Math.random() * 5000 + 5000;
                const destX = (Math.random() - 0.5) * 100;
                const destY = (Math.random() - 0.5) * 100;

                p.animate([
                    { transform: 'translate(0, 0)', opacity: p.style.opacity },
                    { transform: `translate(${destX}px, ${destY}px)`, opacity: 0 }
                ], {
                    duration: duration,
                    easing: 'linear'
                }).onfinish = () => resetParticle(p);
            }
        });
    </script>
